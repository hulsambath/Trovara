name: Code Quality

on:
  # pull_request:
  #   branches: [develop, main]
  push:
    # Trigger on all branch pushes (excluding gh-pages)
    branches-ignore:
      - gh-pages

jobs:
  setup:
    name: Setup and Prepare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
      cache-hit: ${{ steps.cache.outputs.cache-hit }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate cache key
        id: cache-key
        run: |
          echo "key=${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml', '**/pubspec.lock') }}" >> $GITHUB_OUTPUT

      - name: Cache Pub dependencies
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.2"
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

  format-and-analyze:
    name: ${{ matrix.check-name }}
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - check-name: Format Check
            check-type: format
          - check-name: Static Analysis
            check-type: analyze

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.2"
          channel: "stable"
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ needs.setup.outputs.cache-key }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Create Firebase options stub
        run: |
          mkdir -p lib/firebase_options
          cat > lib/firebase_options/staging.dart << 'DART'
          // CI stub – real keys are injected at build time
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          import 'package:flutter/foundation.dart' show defaultTargetPlatform, kIsWeb, TargetPlatform;
          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform {
              switch (defaultTargetPlatform) {
                case TargetPlatform.android:
                  return android;
                case TargetPlatform.iOS:
                  return ios;
                case TargetPlatform.macOS:
                  return macos;
                default:
                  throw UnsupportedError('Platform not supported');
              }
            }
            static const FirebaseOptions android = FirebaseOptions(apiKey: 'x', appId: 'x', messagingSenderId: 'x', projectId: 'x');
            static const FirebaseOptions ios = FirebaseOptions(apiKey: 'x', appId: 'x', messagingSenderId: 'x', projectId: 'x', iosBundleId: 'x');
            static const FirebaseOptions macos = FirebaseOptions(apiKey: 'x', appId: 'x', messagingSenderId: 'x', projectId: 'x', iosBundleId: 'x');
          }
          DART

      - name: Install dependencies
        run: flutter pub get

      - name: Check code formatting
        if: matrix.check-type == 'format'
        run: |
          echo "🎨 Checking code formatting..."
          dart format $(find lib -name "*.dart" -not \( -name "*.g.dart" -o -name "*.gr.dart" -o -path "*/firebase_options/*" \)) --set-exit-if-changed --line-length 120
          echo "✅ Code formatting check passed"

      - name: Run static analysis
        if: matrix.check-type == 'analyze'
        run: |
          echo "🔍 Running static analysis..."
          dart analyze lib --fatal-infos --fatal-warnings
          echo "✅ Static analysis passed"
