name: Code Quality

on:
  # pull_request:
  #   branches: [develop, main]
  push:
    # Trigger on all branch pushes (excluding gh-pages)
    branches-ignore:
      - gh-pages

concurrency:
  group: code-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format and Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.2"
          channel: "stable"
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Create Firebase options stub
        run: bash ./scripts/create_firebase_stub.sh

      - name: Install dependencies
        run: flutter pub get

      - name: Check code formatting
        run: |
          echo "🎨 Checking code formatting..."
          dart format $(find lib -name "*.dart" -not \( -name "*.g.dart" -o -name "*.gr.dart" -o -path "*/firebase_options/*" \)) --set-exit-if-changed --line-length 120
          echo "✅ Code formatting check passed"

      - name: Run static analysis
        run: |
          echo "🔍 Running static analysis..."
          dart analyze lib --fatal-infos --fatal-warnings
          echo "✅ Static analysis passed"
