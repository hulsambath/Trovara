name: Android CI (trovara)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to build"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - staging
          - prod
  push:
    branches: [develop, main]

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: |
      github.event_name == 'push' ||
      github.event.inputs.environment == 'all' ||
      github.event.inputs.environment == matrix.android-env
    strategy:
      fail-fast: false
      matrix:
        include:
          - android-env: staging
            flavor: staging
            target: lib/main_staging.dart
            dart-define-file: configs/trovara_staging.json
            artifact-name: trovara-apk-staging
          - android-env: prod
            flavor: prod
            target: lib/main_prod.dart
            dart-define-file: configs/trovara_prod.json
            artifact-name: trovara-apk-prod
    env:
      ANDROID_ENV: ${{ matrix.android-env }}
      CREDENTIALS_REPO: git@github.com:your-org/trovara-credentials.git
      CREDENTIALS_DIR: credentials
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.2"
          channel: "stable"
          cache: true

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install sops
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gnupg
          curl -fsSL https://github.com/getsops/sops/releases/download/v3.9.0/sops-v3.9.0.linux.amd64 -o sops
          sudo install -m 0755 sops /usr/local/bin/sops

      - name: Verify credentials project exists
        run: |
          if [[ ! -d "../credentials" ]]; then
            echo "❌ Credentials project not found at ../credentials"
            exit 1
          fi
          if [[ ! -f "../credentials/.sops.yaml" ]]; then
            echo "❌ SOPS config not found at ../credentials/.sops.yaml"
            exit 1
          fi

      - name: Decrypt Android secrets (SOPS)
        working-directory: ../credentials
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          set -euo pipefail
          CREDENTIALS_ENV_DIR="android/trovara/${ANDROID_ENV}"
          if [[ ! -f "${CREDENTIALS_ENV_DIR}/upload.jks.enc" ]]; then
            echo "❌ Encrypted keystore not found: ${CREDENTIALS_ENV_DIR}/upload.jks.enc"
            exit 1
          fi
          echo "🔓 Decrypting ${ANDROID_ENV} credentials..."
          sops -d "${CREDENTIALS_ENV_DIR}/upload.jks.enc" > "${CREDENTIALS_ENV_DIR}/upload.jks"
          sops -d "${CREDENTIALS_ENV_DIR}/keystore.properties.enc" > "${CREDENTIALS_ENV_DIR}/keystore.properties"
          sops -d "${CREDENTIALS_ENV_DIR}/google-services.json.enc" > "${CREDENTIALS_ENV_DIR}/google-services.json"

      - name: Create Firebase options stub
        run: bash ./scripts/create_firebase_stub.sh

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK
        run: |
          echo "🔨 Building trovara APK for ${ANDROID_ENV} environment..."
          flutter build apk --release --flavor "${{ matrix.flavor }}" --target="${{ matrix.target }}" --dart-define-from-file="${{ matrix.dart-define-file }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: build/app/outputs/flutter-apk/app-${{ matrix.flavor }}-release.apk
