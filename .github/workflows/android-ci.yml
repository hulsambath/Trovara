name: Android CI (trovara)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to build"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - staging
          - prod
  push:
    branches: [develop, main]

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - android-env: staging
            artifact-name: trovara-apk-staging
          - android-env: prod
            artifact-name: trovara-apk-prod
    env:
      ANDROID_ENV: ${{ matrix.android-env }}
      CREDENTIALS_REPO: git@github.com:your-org/trovara-credentials.git
      CREDENTIALS_DIR: credentials
      SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
    steps:
      - name: Checkout repository
        if: |
          github.event_name == 'push' ||
          github.event.inputs.environment == 'all' ||
          github.event.inputs.environment == matrix.android-env
        uses: actions/checkout@v4

      - name: Set up Flutter
        if: |
          github.event_name == 'push' ||
          github.event.inputs.environment == 'all' ||
          github.event.inputs.environment == matrix.android-env
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install sops
        if: |
          github.event_name == 'push' ||
          github.event.inputs.environment == 'all' ||
          github.event.inputs.environment == matrix.android-env
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gnupg
          curl -fsSL https://github.com/getsops/sops/releases/download/v3.9.0/sops-v3.9.0.linux.amd64 -o sops
          sudo install -m 0755 sops /usr/local/bin/sops

      - name: Verify credentials project exists
        if: |
          github.event_name == 'push' ||
          github.event.inputs.environment == 'all' ||
          github.event.inputs.environment == matrix.android-env
        run: |
          if [[ ! -d "../credentials" ]]; then
            echo "❌ Credentials project not found at ../credentials"
            exit 1
          fi
          if [[ ! -f "../credentials/.sops.yaml" ]]; then
            echo "❌ SOPS config not found at ../credentials/.sops.yaml"
            exit 1
          fi

      - name: Decrypt Android secrets (SOPS)
        if: |
          github.event_name == 'push' ||
          github.event.inputs.environment == 'all' ||
          github.event.inputs.environment == matrix.android-env
        working-directory: ../credentials
        run: |
          set -euo pipefail
          case "$ANDROID_ENV" in
            dev|staging)
              if [[ ! -f "android/trovara/${ANDROID_ENV}/upload.jks.enc" ]]; then
                echo "❌ Encrypted keystore not found: android/trovara/${ANDROID_ENV}/upload.jks.enc"
                exit 1
              fi
              echo "🔓 Decrypting ${ANDROID_ENV} credentials to credentials directory..."
              sops -d android/trovara/${ANDROID_ENV}/upload.jks.enc > android/trovara/${ANDROID_ENV}/upload.jks
              sops -d android/trovara/${ANDROID_ENV}/keystore.properties.enc > android/trovara/${ANDROID_ENV}/keystore.properties
              sops -d android/trovara/${ANDROID_ENV}/google-services.json.enc > android/trovara/${ANDROID_ENV}/google-services.json
              ;;
            prod)
              if [[ ! -f "android/trovara/prod/upload.jks.enc" ]]; then
                echo "❌ Encrypted keystore not found: android/trovara/prod/upload.jks.enc"
                exit 1
              fi
              echo "🔓 Decrypting prod credentials to credentials directory..."
              sops -d android/trovara/prod/upload.jks.enc > android/trovara/prod/upload.jks
              sops -d android/trovara/prod/keystore.properties.enc > android/trovara/prod/keystore.properties
              sops -d android/trovara/prod/google-services.json.enc > android/trovara/prod/google-services.json
              ;;
            *) echo "❌ Unknown ANDROID_ENV=$ANDROID_ENV" && exit 1 ;;
          esac

      - name: Create Firebase options stub
        if: |
          github.event_name == 'push' ||
          github.event.inputs.environment == 'all' ||
          github.event.inputs.environment == matrix.android-env
        run: |
          mkdir -p lib/firebase_options
          cat > lib/firebase_options/staging.dart << 'DART'
          // CI stub – real keys are injected at build time
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          import 'package:flutter/foundation.dart' show defaultTargetPlatform, kIsWeb, TargetPlatform;
          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform {
              switch (defaultTargetPlatform) {
                case TargetPlatform.android:
                  return android;
                case TargetPlatform.iOS:
                  return ios;
                case TargetPlatform.macOS:
                  return macos;
                default:
                  throw UnsupportedError('Platform not supported');
              }
            }
            static const FirebaseOptions android = FirebaseOptions(apiKey: 'x', appId: 'x', messagingSenderId: 'x', projectId: 'x');
            static const FirebaseOptions ios = FirebaseOptions(apiKey: 'x', appId: 'x', messagingSenderId: 'x', projectId: 'x', iosBundleId: 'x');
            static const FirebaseOptions macos = FirebaseOptions(apiKey: 'x', appId: 'x', messagingSenderId: 'x', projectId: 'x', iosBundleId: 'x');
          }
          DART

      - name: Flutter pub get
        if: |
          github.event_name == 'push' ||
          github.event.inputs.environment == 'all' ||
          github.event.inputs.environment == matrix.android-env
        run: flutter pub get

      - name: Build APK - Staging
        if: |
          (github.event_name == 'push' || github.event.inputs.environment == 'all' || github.event.inputs.environment == 'staging') &&
          matrix.android-env == 'staging'
        run: |
          echo "🔨 Building trovara APK for staging environment..."
          flutter build apk --release --flavor staging --target=lib/main_staging.dart --dart-define-from-file=configs/trovara_staging.json

      - name: Build APK - Prod
        if: |
          (github.event_name == 'push' || github.event.inputs.environment == 'all' || github.event.inputs.environment == 'prod') &&
          matrix.android-env == 'prod'
        run: |
          echo "🔨 Building trovara APK for prod environment..."
          flutter build apk --release --flavor prod --dart-define-from-file=configs/trovara_prod.json

      - name: Upload APK artifact
        if: |
          github.event_name == 'push' ||
          github.event.inputs.environment == 'all' ||
          github.event.inputs.environment == matrix.android-env
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            build/app/outputs/flutter-apk/*.apk
