name: Tests

on:
  pull_request:
    branches: [develop, main]
  push:
    # Trigger on all branch pushes (excluding gh-pages)
    branches-ignore:
      - gh-pages

jobs:
  setup:
    name: Setup and Prepare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
      cache-hit: ${{ steps.cache.outputs.cache-hit }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate cache key
        id: cache-key
        run: |
          echo "key=${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}" >> $GITHUB_OUTPUT

      - name: Cache Pub dependencies
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.0"
          channel: "stable"
          cache: true

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: flutter pub get

  build-runner:
    name: Build Runner
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.0"
          channel: "stable"
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ needs.setup.outputs.cache-key }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        if: needs.setup.outputs.cache-hit != 'true'
        run: flutter pub get

      - name: Cache build runner output
        id: cache-build-runner
        uses: actions/cache@v4
        with:
          path: |
            .dart_tool/build
          key: ${{ runner.os }}-build-runner-${{ hashFiles('**/*.dart', '**/pubspec.yaml', '**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-runner-

      - name: Execute build runner
        run: |
          echo "🔨 Running build runner..."
          dart run build_runner build --delete-conflicting-outputs
          echo "✅ Build runner completed"

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: [setup, build-runner]
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.0"
          channel: "stable"
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ needs.setup.outputs.cache-key }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        if: needs.setup.outputs.cache-hit != 'true'
        run: flutter pub get

      - name: Run tests
        run: |
          echo "🧪 Running tests..."
          flutter test --coverage
          echo "✅ Tests completed"

      - name: Upload coverage (optional)
        if: always()
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
