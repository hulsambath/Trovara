name: Shorebird CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

jobs:
  shorebird-check:
    name: Shorebird Compatibility Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.2"
          channel: "stable"
          cache: true

      - name: Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - name: Create Firebase options stub
        run: |
          mkdir -p lib/firebase_options
          cat > lib/firebase_options/staging.dart << 'DART'
          // CI stub – real keys are injected at build time
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          import 'package:flutter/foundation.dart' show defaultTargetPlatform, TargetPlatform;
          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform {
              switch (defaultTargetPlatform) {
                case TargetPlatform.android:
                  return android;
                case TargetPlatform.iOS:
                  return ios;
                case TargetPlatform.macOS:
                  return macos;
                default:
                  throw UnsupportedError('Platform not supported');
              }
            }
            static const FirebaseOptions android = FirebaseOptions(apiKey: 'x', appId: 'x', messagingSenderId: 'x', projectId: 'x');
            static const FirebaseOptions ios = FirebaseOptions(apiKey: 'x', appId: 'x', messagingSenderId: 'x', projectId: 'x', iosBundleId: 'x');
            static const FirebaseOptions macos = FirebaseOptions(apiKey: 'x', appId: 'x', messagingSenderId: 'x', projectId: 'x', iosBundleId: 'x');
          }
          DART
          cp lib/firebase_options/staging.dart lib/firebase_options/prod.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Shorebird Doctor
        run: shorebird doctor

      - name: Validate Shorebird Configuration
        run: |
          echo "✅ Shorebird configuration is valid"
          echo "📱 App ID: $(grep 'app_id:' shorebird.yaml | cut -d' ' -f2)"
          echo "🍧 Flavors: $(grep -A 10 'flavors:' shorebird.yaml | grep -E '^\s+\w+:' | wc -l | xargs echo)"
