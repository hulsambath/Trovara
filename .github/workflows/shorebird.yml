name: Shorebird CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

concurrency:
  group: shorebird-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shorebird-check:
    name: Shorebird Compatibility Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.2"
          channel: "stable"
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - name: Create Firebase options stub
        run: bash ./scripts/create_firebase_stub.sh

      - name: Install dependencies
        run: flutter pub get

      - name: Shorebird Doctor
        run: shorebird doctor

      - name: Validate Shorebird Configuration
        run: |
          echo "✅ Shorebird configuration is valid"
          echo "📱 App ID: $(grep 'app_id:' shorebird.yaml | cut -d' ' -f2)"
          echo "🍧 Flavors: $(grep -A 10 'flavors:' shorebird.yaml | grep -E '^\s+\w+:' | wc -l | xargs echo)"
