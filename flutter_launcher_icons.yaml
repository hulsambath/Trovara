# flutter pub run flutter_launcher_icons

flutter_launcher_icons:
  image_path: "assets/app_icon/1024x1024.png"

  android: "ic_launcher"
  adaptive_icon_background: "assets/app_icon/1024x1024.png"
  adaptive_icon_foreground: "assets/app_icon/1024x1024.png"
  min_sdk_android: 21

  ios: true
  image_path_ios: "assets/app_icon/1024x1024.png"
  remove_alpha_ios: true

  web:
    generate: true
    image_path: "assets/app_icon/1024x1024.png"
    background_color: "#FFFFFF"
    theme_color: "#7C4DFF"

  windows:
    generate: false

  macos:
    generate: true
    image_path: "assets/app_icon/1024x1024.png"
